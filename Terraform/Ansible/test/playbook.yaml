---
- name: Deploy Nginx on Kubernetes
  hosts: wsl
  tasks:
    - name: Create a web-demo namespace
      kubernetes.core.k8s:
        name: web-demo
        api_version: v1
        kind: Namespace
        state: present

    - name: Deploy Nginx Deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: nginx-deployment
            namespace: web-demo
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: nginx
            template:
              metadata:
                labels:
                  app: nginx
              spec:
                containers:
                - name: nginx
                  image: nginx:latest
                  ports:
                  - containerPort: 80

    - name: Create Nginx Service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: nginx-service
            namespace: web-demo
          spec:
            type: NodePort
            selector:
              app: nginx
            ports:
            - port: 80
              targetPort: 80
              nodePort: 30080
