services:
  jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      # Optional: Allows Jenkins to run Docker commands
      - /var/run/docker.sock:/var/run/docker.sock 
    restart: always

volumes:
  jenkins_home:

